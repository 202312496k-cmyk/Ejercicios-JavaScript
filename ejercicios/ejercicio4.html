<h1>4. Mayor o menor de edad</h1>

<p id="resultado"></p>

<script>
let edad = 20;
let mensaje = "";

if(edad >= 18){
    mensaje = "Es mayor de edad";
}else{
    mensaje = "Es menor de edad";
}

document.getElementById("resultado").innerHTML = mensaje;
</script>
